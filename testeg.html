<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fluxo de Gotículas Suaves</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Um gradiente profundo para dar dimensão ao fundo */
            background: radial-gradient(circle at center, #1a2a3a 0%, #070b10 100%);
        }

        canvas {
            display: block;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            pointer-events: none;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="content">
        <h2 style="font-weight: 300;">Atmosfera</h2>
        <p style="font-size: 0.8em; opacity: 0.5;">Partículas em suspensão</p>
    </div>

    <canvas id="dropletCanvas"></canvas>

    <script>
        const canvas = document.getElementById('dropletCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let droplets = [];
        
        const config = {
            count: 120,            // Quantidade de gotículas
            speedMin: 0.1,         // Movimento quase imperceptível
            speedMax: 0.8,         // Velocidade máxima suave
            baseColor: '200, 220, 255' // Tom levemente azulado/branco
        };

        class Droplet {
            constructor() {
                this.init(true);
            }

            init(randomX = false) {
                this.y = Math.random() * canvas.height;
                this.x = randomX ? (Math.random() * canvas.width) : -20;
                
                // Atributos baseados na "profundidade"
                // Gotas mais rápidas são maiores e mais opacas (estão na frente)
                this.z = Math.random(); // Fator de profundidade 0 a 1
                
                this.speed = this.z * (config.speedMax - config.speedMin) + config.speedMin;
                this.radius = this.z * 4 + 1; // Tamanho entre 1 e 5 pixels
                this.opacity = this.z * 0.3 + 0.05; // Opacidade entre 5% e 35%
                
                // Oscilação vertical suave (para não ser uma linha reta perfeita)
                this.oscillation = Math.random() * 0.5;
                this.oscSpeed = Math.random() * 0.02;
                this.time = Math.random() * 100;
            }

            draw() {
                this.time += this.oscSpeed;
                const currentY = this.y + Math.sin(this.time) * 10 * this.oscillation;

                // Desenha a gotícula como um círculo suave
                ctx.beginPath();
                
                // Cria um leve brilho interno (Radial Gradient) para cada gota
                let grad = ctx.createRadialGradient(this.x, currentY, 0, this.x, currentY, this.radius);
                grad.addColorStop(0, `rgba(${config.baseColor}, ${this.opacity})`);
                grad.addColorStop(1, `rgba(${config.baseColor}, 0)`);

                ctx.fillStyle = grad;
                ctx.arc(this.x, currentY, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Adiciona um leve "bloom" (brilho) para as gotas mais próximas
                if (this.z > 0.8) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `rgba(${config.baseColor}, ${this.opacity})`;
                } else {
                    ctx.shadowBlur = 0;
                }
            }

            update() {
                this.x += this.speed;

                if (this.x > canvas.width + 20) {
                    this.init(false);
                }
                this.draw();
            }
        }

        function initScene() {
            droplets = [];
            for (let i = 0; i < config.count; i++) {
                droplets.push(new Droplet());
            }
        }

        function animate() {
            // Limpa o canvas com o fundo escuro
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            droplets.forEach(d => d.update());
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initScene();
        });

        initScene();
        animate();
    </script>
</body>
</html>
